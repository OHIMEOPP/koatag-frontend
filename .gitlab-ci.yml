
stages:          
  - test
  - builddocker

run-test-job:      
  image: node:20
  stage: test
  script:
    - npm run build
  before_script:
  - npm install
  - chmod +x node_modules/.bin/vite



build-docker-image:  
  image: docker:latest 
  stage: builddocker
  tags:
    - shell
  needs: 
    - run-test-job   
  script:
    - docker build -t js--react-app .

